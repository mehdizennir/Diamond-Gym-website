<!DOCTYPE html>
<html>

<head>
    <link rel="icon" type="image/png" href="images\images.png">
    <link rel="stylesheet" href="style.css">
    <title>Admin Login</title>
</head>

<body>

    <section class="hero">
        <h1>Admin Login</h1>
    </section>

    <section class="container">
        <div class="cards" style="justify-content: center; display: flex;">
            <div class="card" style="width: 100%; max-width: 450px; padding: 40px;">
                <form onsubmit="return handleLogin(event)">

                    <label>Username</label><br>
                    <input type="text" id="username" required><br>

                    <label>Password</label><br>
                    <input type="password" id="password" required><br>

                    <p id="error-msg" style="color: #ff3c3c; font-size: 14px; margin-bottom: 15px; display: none;">
                        Invalid username or password.</p>

                    <button type="submit">Login</button>

                </form>

                <p style="margin-top: 20px;"><a href="index.html" style="color: white; text-decoration: underline;">Back
                        to Website</a></p>
            </div>
        </div>
    </section>

</body>
<script>
    function handleLogin(event) {
        event.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        // Hardcoded credentials
        if (user === 'admin' && pass === 'admin123') {
            window.location.href = 'admin-dashboard.html';
        } else {
            errorMsg.style.display = 'block';
        }
    }
</script>

</html>
